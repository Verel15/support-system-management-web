<div class="p-6 flex flex-col gap-5">
  <!-- Header -->
  <h1 class="text-2xl font-semibold text-slate-800">ประเภท Ticket</h1>

  <!-- Tab bar -->
  <div class="border-b border-slate-200">
    <nav class="-mb-px flex gap-6" role="tablist" aria-label="แท็บประเภท Ticket">
      @for (tab of tabs; track tab.value) {
        <button
          type="button"
          role="tab"
          [attr.aria-selected]="activeTab() === tab.value"
          class="pb-3 text-sm font-medium border-0 border-b-2 bg-transparent transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
          [class.text-primary-600]="activeTab() === tab.value"
          [class.border-primary-600]="activeTab() === tab.value"
          [class.text-slate-500]="activeTab() !== tab.value"
          [class.border-transparent]="activeTab() !== tab.value"
          (click)="setActiveTab(tab.value)"
        >
          {{ tab.label }}
        </button>
      }
    </nav>
  </div>

  <!-- Filters -->
  <div class="flex flex-col sm:flex-row sm:items-center gap-3">
    <p-select
      [options]="dateOptions"
      [ngModel]="selectedDate()"
      (ngModelChange)="selectedDate.set($event)"
      optionLabel="label"
      optionValue="value"
      placeholder="วันที่สร้าง"
      class="shrink-0 w-full sm:w-44"
      aria-label="กรองตามวันที่สร้าง"
    />

    <p-icon-field class="flex-1 min-w-0">
      <p-inputicon class="pi pi-search" />
      <input
        pInputText
        type="search"
        [placeholder]="searchPlaceholder()"
        [ngModel]="searchQuery()"
        (ngModelChange)="onSearch($event)"
        class="w-full h-12 appearance-none"
        [attr.aria-label]="searchPlaceholder()"
      />
    </p-icon-field>

    <p-button
      label="ตัวกรอง"
      icon="pi pi-sliders-h"
      severity="secondary"
      [outlined]="true"
      class="shrink-0"
      aria-label="เปิดตัวกรอง"
    />

    <p-button
      [label]="addButtonLabel()"
      icon="pi pi-plus"
      severity="primary"
      class="shrink-0"
      (onClick)="onAdd()"
    />
  </div>

  <!-- Table -->
  <app-data-table
    [columns]="currentColumns()"
    [data]="currentData()"
    [totalRecords]="totalRecords()"
    [currentPage]="currentPage()"
    [pageSize]="pageSize()"
    [loading]="loading()"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (sortChange)="onSort($event)"
  >
    <ng-template dataTableCell="priority" let-value="value">
      <span
        class="inline-flex items-center gap-1.5 text-sm font-medium"
        [class.text-error-600]="value === 'มาก'"
        [class.text-secondary-500]="value === 'ปานกลาง'"
        [class.text-primary-600]="value === 'น้อย'"
      >
        <span aria-hidden="true">{{ prioritySymbol(value) }}</span>
        {{ value }}
      </span>
    </ng-template>

    <ng-template dataTableCell="_actions" let-row>
      <button
        type="button"
        class="inline-flex items-center justify-center w-8 h-8 rounded text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-(--p-primary-500)"
        aria-label="การดำเนินการ"
        (click)="onMenuOpen($event, row)"
      >
        <i class="pi pi-ellipsis-h" aria-hidden="true"></i>
      </button>
    </ng-template>
  </app-data-table>
</div>

<app-confirm-dialog
  [(visible)]="showConfirmDialog"
  type="warning"
  title="ยืนยันการลบ"
  confirmLabel="ยืนยัน"
  cancelLabel="ยกเลิก"
  (confirmed)="onDeleteFirstStepConfirmed()"
>
  คุณแน่ใจที่จะลบ
  <strong class="text-primary-600">{{ deletingItem() }}</strong>
  ออกหรือไม่?
</app-confirm-dialog>

<app-delete-confirm-dialog
  [(visible)]="showDeleteDialog"
  [targetLabel]="deletingItem() ?? ''"
  (confirmed)="onDeleteConfirmed($event)"
/>

<p-menu #actionMenu [model]="menuItems" [popup]="true" [appendTo]="'body'">
  <ng-template #item let-item pTemplate="item">
    <a class="p-menu-item-link" role="menuitem">
      <span class="p-menu-item-label" [class.text-error-600]="item.danger">{{ item.label }}</span>
    </a>
  </ng-template>
</p-menu>
