<div class="flex flex-col min-h-full">
  <!-- Header -->
  <div class="relative flex items-center px-6 py-4 border-b border-slate-200">
    <p-button
      type="button"
      icon="pi pi-arrow-left"
      severity="secondary"
      variant="text"
      [rounded]="true"
      (onClick)="onBack()"
      aria-label="กลับ"
    />
    <h1
      class="absolute inset-0 flex items-center justify-center text-xl font-semibold text-slate-800 pointer-events-none"
    >
      แก้ไขประเภท
    </h1>
  </div>

  <!-- Content -->
  <div class="flex-1 overflow-y-auto p-6">
    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="max-w-xl mx-auto flex flex-col gap-6"
    >
      <!-- ชื่อประเภท -->
      <div class="flex flex-col gap-1.5">
        <label for="typeName" class="text-sm font-semibold text-slate-800">ชื่อประเภท</label>
        <input
          pInputText
          id="typeName"
          formControlName="name"
          placeholder="กรุณากรอกชื่อประเภท"
          class="w-full"
          [class.ng-invalid]="isNameInvalid()"
          [class.ng-dirty]="isNameInvalid()"
          aria-required="true"
          [attr.aria-invalid]="isNameInvalid()"
          aria-describedby="nameError"
        />
        @if (isNameInvalid()) {
          <span id="nameError" class="text-sm text-error-600">กรุณากรอกชื่อประเภท</span>
        }
      </div>

      <!-- Category -->
      <div class="flex flex-col gap-3">
        <h2 class="text-sm font-semibold text-slate-800 pl-3 border-l-4 border-primary-500">
          Category
        </h2>

        @if (selectedCategories().length > 0) {
          <ul class="flex flex-col gap-2" aria-label="Category ที่เลือกแล้ว">
            @for (cat of selectedCategories(); track cat.value) {
              <li
                class="flex items-center justify-between px-4 py-2.5 rounded-lg border border-slate-200 bg-white"
              >
                <span class="text-sm text-slate-700">{{ cat.label }}</span>
                <button
                  type="button"
                  class="w-6 h-6 flex items-center justify-center rounded text-slate-400 hover:text-error-500 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-error-300"
                  [attr.aria-label]="'ลบ ' + cat.label"
                  (click)="removeCategory(cat.value)"
                >
                  <i class="pi pi-times text-xs" aria-hidden="true"></i>
                </button>
              </li>
            }
          </ul>
        }

        <p-button
          type="button"
          label="เลือก Category"
          severity="primary"
          [outlined]="true"
          fluid
          (onClick)="showCategoryDialog.set(true)"
          aria-haspopup="dialog"
        />
      </div>

      <!-- Submit -->
      <p-button
        type="submit"
        label="บันทึก"
        severity="primary"
        fluid
        [disabled]="!canSubmit()"
        [loading]="submitting()"
      />
    </form>
  </div>
</div>

<!-- Step 1: Confirm intent -->
<app-confirm-dialog
  [(visible)]="showConfirmDialog"
  type="warning"
  title="ยืนยันการแก้ไขประเภท Ticket"
  confirmLabel="ยืนยัน"
  cancelLabel="ยกเลิก"
  (confirmed)="onConfirmStep1()"
>
  คุณแน่ใจที่จะแก้ไขประเภท
  <strong class="text-primary-600">{{ currentName() }}</strong>
  ใช่หรือไม่?
</app-confirm-dialog>

<!-- Step 2: Password confirmation -->
<app-delete-confirm-dialog
  [(visible)]="showPasswordDialog"
  title="ยืนยันการแก้ไขด้วยรหัสผ่าน"
  descriptionPrefix="คุณกำลังจะแก้ไขข้อมูลประเภท"
  [targetLabel]="currentName()"
  [loading]="submitting()"
  (confirmed)="onSaveConfirmed($event)"
/>

<!-- Category selector -->
<app-select-items-dialog
  [(visible)]="showCategoryDialog"
  title="Category"
  subtitle="เลือก Category ที่เกี่ยวข้อง"
  [items]="categoryOptions"
  [selected]="selectedCategoryValues()"
  (confirmed)="onCategoryConfirmed($event)"
/>
