<div class="bg-white rounded-2xl shadow-2xl p-10 w-full min-w-[448px]">
  <div class="text-center mb-6">
    <h1 class="text-2xl font-bold text-secondary-900 mb-2">ลืมรหัสผ่าน</h1>
    <p class="text-secondary-500 text-sm">กรุณากรอกอีเมลของคุณ เพื่อเปลี่ยนรหัสผ่าน</p>
  </div>

  <p-fluid>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      <div class="flex flex-col gap-2">
        <label for="email" class="font-medium text-secondary-700">อีเมล</label>
        <input
          pInputText
          id="email"
          type="email"
          formControlName="email"
          placeholder="กรุณากรอกข้อมูล"
          autocomplete="email"
          [attr.aria-invalid]="isEmailInvalid() ? 'true' : null"
          aria-describedby="email-error"
          class="h-12"
        />
        @if (isEmailInvalid()) {
          <small id="email-error" class="text-error-500" role="alert">กรุณากรอกอีเมลให้ถูกต้อง</small>
        }
      </div>

      <p-button
        type="submit"
        label="ยืนยัน"
        [disabled]="form.invalid"
        styleClass="w-full"
      />
    </form>
  </p-fluid>
</div>

<app-alert-dialog
  [(visible)]="showErrorDialog"
  type="error"
  title="ไม่พบอีเมลในระบบ"
  (closed)="closeErrorDialog()"
>
  อีเมล <span class="font-medium">{{ submittedEmail() }}</span> ไม่พบในระบบ กรุณาลองใหม่อีกครั้ง
</app-alert-dialog>
