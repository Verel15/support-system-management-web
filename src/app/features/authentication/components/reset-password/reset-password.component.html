<div class="bg-white rounded-2xl shadow-2xl p-12 w-full min-w-[448px]">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-secondary-900">เปลี่ยนรหัสผ่านใหม่</h1>
  </div>

  <p-fluid>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      <div class="flex flex-col gap-2">
        <label for="newPassword" class="font-medium text-secondary-700">รหัสผ่านใหม่</label>
        <p-password
          inputId="newPassword"
          formControlName="newPassword"
          [toggleMask]="true"
          [feedback]="false"
          placeholder="กรุณากรอกข้อมูล"
          autocomplete="new-password"
          [attr.aria-invalid]="isNewPasswordInvalid() ? 'true' : null"
          class="h-12"
        />
      </div>

      <div class="flex flex-col gap-2">
        <label for="confirmPassword" class="font-medium text-secondary-700">ยืนยันรหัสผ่าน</label>
        <p-password
          inputId="confirmPassword"
          formControlName="confirmPassword"
          [toggleMask]="true"
          [feedback]="false"
          placeholder="กรุณากรอกข้อมูล"
          autocomplete="new-password"
          [attr.aria-invalid]="isConfirmPasswordInvalid() ? 'true' : null"
          class="h-12"
        />
        @if (isPasswordMismatch()) {
          <small class="text-error-500" role="alert">รหัสผ่านไม่ตรงกัน</small>
        }
      </div>

      <!-- Password Requirements -->
      <div class="flex flex-col gap-2" aria-label="เงื่อนไขการตั้งรหัสผ่าน">
        <p class="text-sm font-medium text-secondary-700">เงื่อนไขการตั้งรหัสผ่าน</p>
        <ul class="flex flex-col gap-1.5" role="list">
          <li
            class="flex items-center gap-2 text-sm"
            [class]="hasUppercase() ? 'text-primary-600 font-semibold' : 'text-secondary-400'"
          >
            <i
              class="pi text-base"
              [class]="hasUppercase() ? 'pi-check-circle' : 'pi-circle'"
              aria-hidden="true"
            ></i>
            พิมพ์ใหญ่อย่างน้อย 1 ตัวอักษร
          </li>
          <li
            class="flex items-center gap-2 text-sm"
            [class]="hasLowercase() ? 'text-primary-600 font-semibold' : 'text-secondary-400'"
          >
            <i
              class="pi text-base"
              [class]="hasLowercase() ? 'pi-check-circle' : 'pi-circle'"
              aria-hidden="true"
            ></i>
            พิมพ์เล็กอย่างน้อย 1 ตัวอักษร
          </li>
          <li
            class="flex items-center gap-2 text-sm"
            [class]="hasNumber() ? 'text-primary-600 font-semibold' : 'text-secondary-400'"
          >
            <i
              class="pi text-base"
              [class]="hasNumber() ? 'pi-check-circle' : 'pi-circle'"
              aria-hidden="true"
            ></i>
            ตัวเลขอย่างน้อย 1 ตัวอักษร
          </li>
          <li
            class="flex items-center gap-2 text-sm"
            [class]="hasValidLength() ? 'text-primary-600 font-semibold' : 'text-secondary-400'"
          >
            <i
              class="pi text-base"
              [class]="hasValidLength() ? 'pi-check-circle' : 'pi-circle'"
              aria-hidden="true"
            ></i>
            รหัสผ่านต้องมีอย่างน้อย 8-16 ตัวอักษร
          </li>
        </ul>
      </div>

      <p-button
        type="submit"
        label="เปลี่ยนรหัสผ่าน"
        [disabled]="form.invalid"
        styleClass="w-full mt-2"
      />
    </form>
  </p-fluid>
</div>
