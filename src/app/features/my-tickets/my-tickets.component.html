<div class="p-6 flex flex-col gap-6">
  <!-- Header -->
  <header class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold text-slate-800">Tickets ของฉัน</h1>
    <div class="w-full sm:w-auto md:w-44">
      <p-button
        label="เพิ่ม Ticket"
        icon="pi pi-plus"
        (onClick)="onAddTicket()"
        severity="primary"
        fluid
      />
    </div>
  </header>

  <!-- Recent Projects -->
  <section aria-labelledby="recent-projects-heading">
    <div class="flex items-center justify-between mb-4">
      <h2 id="recent-projects-heading" class="text-base font-semibold text-slate-800">
        โครงการล่าสุด
      </h2>
      <a
        routerLink="/dashboard/my-projects"
        class="text-sm text-primary-600 hover:text-primary-700 hover:underline"
      >
        ดูทั้งหมด
      </a>
    </div>
    <div class="flex gap-4 overflow-x-auto pb-2" role="list" aria-label="โครงการล่าสุด">
      @for (project of recentProjects; track project.name) {
        <div role="listitem" class="w-56 shrink-0">
          <app-project-card [project]="project" />
        </div>
      }
    </div>
  </section>

  <!-- Ticket Table Card -->
  <section class="bg-white rounded-xl flex flex-col gap-4">
    <!-- Tabs -->
    <p-tabs [value]="activeTab()">
      <p-tablist>
        <p-tab [value]="0" (click)="activeTab.set(0); currentPage.set(1)">การทำงาน</p-tab>
        <p-tab [value]="1" (click)="activeTab.set(1); currentPage.set(1)">Tickets ของฉัน</p-tab>
        <p-tab [value]="2" (click)="activeTab.set(2); currentPage.set(1)">การดูแลคนอื่น</p-tab>
      </p-tablist>
    </p-tabs>

    <!-- Filters -->
    <div class="flex flex-col sm:flex-row sm:items-center gap-3">
      <div class="flex flex-col sm:flex-row gap-3 shrink-0">
        <p-select
          [options]="priorityOptions"
          [ngModel]="priorityFilter()"
          (ngModelChange)="priorityFilter.set($event); onFilterChange()"
          optionLabel="label"
          optionValue="value"
          placeholder="ทุกระดับความสำคัญ"
          class="w-full sm:w-auto sm:min-w-44"
          aria-label="กรองตามระดับความสำคัญ"
        />
        <p-select
          [options]="timeOptions"
          [ngModel]="timeFilter()"
          (ngModelChange)="timeFilter.set($event); onFilterChange()"
          optionLabel="label"
          optionValue="value"
          placeholder="ระยะเวลาที่เหลือ"
          class="w-full sm:w-auto sm:min-w-44"
          aria-label="กรองตามระยะเวลาที่เหลือ"
        />
      </div>
      <div class="sm:ml-auto w-full sm:w-72">
        <p-icon-field class="w-full">
          <p-inputicon class="pi pi-search" />
          <input
            pInputText
            type="search"
            placeholder="ค้นหา"
            [ngModel]="searchQuery()"
            (ngModelChange)="onSearch($event)"
            class="w-full h-12 appearance-none"
            aria-label="ค้นหา Ticket"
          />
        </p-icon-field>
      </div>
    </div>

    <!-- Table -->
    <app-data-table
      [columns]="columns"
      [data]="pagedTickets()"
      [totalRecords]="totalRecords()"
      [currentPage]="currentPage()"
      [pageSize]="pageSize()"
      [loading]="loading()"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
      (sortChange)="onSort($event)"
    >
      <!-- Priority dot + title -->
      <ng-template dataTableCell="title" let-row let-value="value">
        <div class="flex items-center gap-2">
          <span
            class="w-2 h-2 rounded-full shrink-0"
            [class]="getPriorityDotClass(row['priority'])"
            aria-hidden="true"
          ></span>
          <span class="text-slate-700">{{ value }}</span>
        </div>
      </ng-template>

      <!-- Status tag -->
      <ng-template dataTableCell="status" let-value="value">
        <app-status-chip [status]="value" />
      </ng-template>
    </app-data-table>
  </section>
</div>
