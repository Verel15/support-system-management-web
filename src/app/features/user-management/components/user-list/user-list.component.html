<div class="p-6 flex flex-col gap-5">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold text-slate-800">รายชื่อทั้งหมด</h1>
    <div class="w-full sm:w-auto md:w-44">
      <p-button
        label="เพิ่มผู้ใช้"
        icon="pi pi-plus"
        (onClick)="onAddUser()"
        severity="primary"
        fluid
      />
    </div>
  </div>

  <!-- Filters -->
  <div class="flex flex-col sm:flex-row sm:items-center gap-3">
    <!-- Left: dropdown filters -->
    <div class="flex flex-col sm:flex-row sm:flex-wrap sm:items-center gap-3 shrink-0">
      <p-select
        [options]="userTypeOptions"
        [ngModel]="selectedUserType()"
        (ngModelChange)="selectedUserType.set($event); onFilterChange()"
        optionLabel="label"
        optionValue="value"
        placeholder="ประเภท"
        class="w-full sm:w-auto sm:min-w-36"
        aria-label="กรองตามประเภทผู้ใช้"
      />

      <p-select
        [options]="dateOptions"
        [ngModel]="selectedDate()"
        (ngModelChange)="selectedDate.set($event); onFilterChange()"
        optionLabel="label"
        optionValue="value"
        placeholder="วันที่สร้าง"
        class="w-full sm:w-auto sm:min-w-44"
        aria-label="กรองตามวันที่สร้าง"
      />
    </div>

    <!-- Right: search + filter button -->
    <div class="flex items-center gap-3 w-full sm:w-80 sm:ml-auto">
      <p-icon-field class="w-full">
        <p-inputicon class="pi pi-search" />
        <input
          pInputText
          type="search"
          placeholder="ค้นหา"
          [ngModel]="searchQuery()"
          (ngModelChange)="onSearch($event)"
          class="w-full h-12 appearance-none"
          aria-label="ค้นหาผู้ใช้"
        />
      </p-icon-field>
    </div>
  </div>

  <!-- Table -->
  <app-data-table
    [columns]="columns"
    [data]="pagedUsers()"
    [totalRecords]="totalRecords()"
    [currentPage]="currentPage()"
    [pageSize]="pageSize()"
    [loading]="loading()"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (sortChange)="onSort($event)"
  />
</div>
