<div class="p-6 flex flex-col gap-5">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold text-slate-800">รายการสถานะทั้งหมด</h1>
    <div class="w-full sm:w-auto md:w-44">
      <p-button
        label="เพิ่มสถานะ"
        icon="pi pi-plus"
        (onClick)="onAddStatus()"
        severity="primary"
        fluid
      />
    </div>
  </div>

  <!-- Filters -->
  <div class="flex flex-col sm:flex-row sm:items-center gap-3">
    <div class="flex flex-col sm:flex-row sm:flex-wrap sm:items-center gap-3 shrink-0">
      <p-select
        [options]="dateOptions"
        [ngModel]="selectedDate()"
        (ngModelChange)="selectedDate.set($event)"
        optionLabel="label"
        optionValue="value"
        placeholder="วันที่แก้ไข"
        class="w-full sm:w-auto sm:min-w-44"
        aria-label="กรองตามวันที่แก้ไข"
      />
    </div>
  </div>

  <!-- Table -->
  <app-data-table
    [columns]="columns"
    [data]="tableRows()"
    [totalRecords]="totalRecords()"
    [currentPage]="currentPage()"
    [pageSize]="pageSize()"
    [loading]="loading()"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (sortChange)="onSort($event)"
  >
    <ng-template dataTableCell="_actions" let-row>
      <button
        type="button"
        class="inline-flex items-center justify-center w-8 h-8 rounded text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-(--p-primary-500)"
        aria-label="การดำเนินการ"
        (click)="onMenuOpen($event, row)"
      >
        <i class="pi pi-ellipsis-h" aria-hidden="true"></i>
      </button>
    </ng-template>
  </app-data-table>
</div>

<app-confirm-dialog
  [(visible)]="showConfirmDialog"
  type="warning"
  title="ยืนยันการลบสถานะ"
  confirmLabel="ยืนยัน"
  cancelLabel="ยกเลิก"
  (confirmed)="onDeleteFirstStepConfirmed()"
>
  ขณะนี้สถานะ
  <strong class="text-primary-600">{{ activeRow()?.name }}</strong>
  มี tickets ที่ดำเนินการสถานะนี้อยู่จำนวน
  <strong class="text-primary-600">{{ activeRow()?.ticketCount }} tickets</strong>
  หากทำการนำสถานะนี้ออก tickets ที่ใช้สถานะนี้จะถูกลบออกด้วย
  คุณแน่ใจที่จะลบสถานะนี้ออกหรือไม่?
</app-confirm-dialog>

<app-delete-confirm-dialog
  [(visible)]="showDeleteDialog"
  [targetLabel]="activeRow()?.name ?? ''"
  [loading]="deleting()"
  (confirmed)="onDeleteConfirmed($event)"
/>

<p-menu #actionMenu [model]="menuItems" [popup]="true" [appendTo]="'body'">
  <ng-template #item let-item pTemplate="item">
    <a class="p-menu-item-link" role="menuitem">
      <span class="p-menu-item-label" [class.text-error-600]="item.danger">{{ item.label }}</span>
    </a>
  </ng-template>
</p-menu>
