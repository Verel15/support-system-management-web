<article class="bg-white rounded-lg border border-slate-200 p-6 flex flex-col gap-5 h-full">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h2 class="text-base font-semibold text-slate-800 border-l-4 border-primary-500 pl-3">
      Tickets
    </h2>
  </div>

  <!-- Year picker -->
  <p-datepicker
    [formControl]="yearCtrl"
    view="year"
    dateFormat="yy"
    [showIcon]="true"
    icon="pi pi-calendar"
    styleClass="w-56"
    inputStyleClass="text-sm"
    aria-label="เลือกปี"
  />

  @if (loading()) {
    <div class="flex flex-1 items-center justify-center" aria-live="polite" aria-label="กำลังโหลด">
      <i class="pi pi-spin pi-spinner text-2xl text-slate-400" aria-hidden="true"></i>
    </div>
  } @else if (summary()) {
    <!-- Main stat: average open -->
    <div class="flex flex-col items-center gap-2 py-4 flex-1 justify-center">
      <div class="flex items-end gap-2">
        <span class="text-6xl font-black text-slate-800 leading-none">
          {{ summary()!.avgOpen }}
        </span>
        <i
          class="mb-1 text-xl"
          [class]="summary()!.openTrend === 'up'
            ? 'pi pi-arrow-up text-primary-500'
            : summary()!.openTrend === 'down'
              ? 'pi pi-arrow-down text-error-500'
              : 'pi pi-minus text-slate-400'"
          [attr.aria-label]="summary()!.openTrend === 'up' ? 'เพิ่มขึ้น' : summary()!.openTrend === 'down' ? 'ลดลง' : 'คงที่'"
        ></i>
      </div>
      <p class="text-sm text-slate-500">ค่าเฉลี่ยการเปิด</p>
    </div>

    <hr class="border-slate-100" />

    <!-- Sub stats -->
    <div class="grid grid-cols-2 divide-x divide-slate-100">
      <div class="flex flex-col items-center gap-2 pr-4">
        <div class="flex items-end gap-1">
          <span class="text-3xl font-bold text-slate-800">{{ summary()!.avgOverdue }}</span>
          <i
            class="mb-0.5 text-base"
            [class]="summary()!.overdueTrend === 'up'
              ? 'pi pi-arrow-up text-error-500'
              : summary()!.overdueTrend === 'down'
                ? 'pi pi-arrow-down text-primary-500'
                : 'pi pi-minus text-slate-400'"
            [attr.aria-label]="summary()!.overdueTrend === 'up' ? 'เพิ่มขึ้น' : summary()!.overdueTrend === 'down' ? 'ลดลง' : 'คงที่'"
          ></i>
        </div>
        <p class="text-xs text-slate-500 text-center">ค่าเฉลี่ยเกินกำหนด</p>
      </div>
      <div class="flex flex-col items-center gap-2 pl-4">
        <div class="flex items-end gap-1">
          <span class="text-3xl font-bold text-slate-800">{{ summary()!.avgSuccess }}</span>
          <i
            class="mb-0.5 text-base"
            [class]="summary()!.successTrend === 'up'
              ? 'pi pi-arrow-up text-primary-500'
              : summary()!.successTrend === 'down'
                ? 'pi pi-arrow-down text-error-500'
                : 'pi pi-minus text-slate-400'"
            [attr.aria-label]="summary()!.successTrend === 'up' ? 'เพิ่มขึ้น' : summary()!.successTrend === 'down' ? 'ลดลง' : 'คงที่'"
          ></i>
        </div>
        <p class="text-xs text-slate-500 text-center">ค่าเฉลี่ยการปิดสำเร็จ</p>
      </div>
    </div>
  } @else {
    <div class="flex flex-1 items-center justify-center text-sm text-slate-400">ไม่มีข้อมูล</div>
  }
</article>
