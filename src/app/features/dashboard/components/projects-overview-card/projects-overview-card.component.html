<article class="bg-white rounded-lg border border-slate-200 p-6 flex flex-col gap-5 h-full">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h2 class="text-base font-semibold text-slate-800 border-l-4 border-primary-500 pl-3">
      โครงการทั้งหมด
    </h2>
  </div>

  <!-- Year picker -->
  <p-datepicker
    [formControl]="yearCtrl"
    view="year"
    dateFormat="yy"
    [showIcon]="true"
    icon="pi pi-calendar"
    styleClass="w-56"
    inputStyleClass="text-sm"
    aria-label="เลือกปี"
  />

  @if (loading()) {
    <div class="flex flex-1 items-center justify-center" aria-live="polite" aria-label="กำลังโหลด">
      <i class="pi pi-spin pi-spinner text-2xl text-slate-400" aria-hidden="true"></i>
    </div>
  } @else if (data()) {
    <!-- Chart + legend -->
    <div class="flex items-center justify-center gap-6 flex-1">
      <div class="w-40 md:w-64 shrink-0">
        <canvas
          #chartCanvas
          role="img"
          aria-label="กราฟแสดงสัดส่วนโครงการตามสถานะ"
        ></canvas>
      </div>
      <dl class="flex flex-col gap-4">
        @for (seg of segments; track seg.label) {
          <div class="flex items-center gap-2.5">
            <span
              class="inline-block w-3.5 h-3.5 rounded-sm shrink-0"
              [style.background]="seg.color"
              aria-hidden="true"
            ></span>
            <dt class="text-sm text-slate-600">{{ seg.label }}</dt>
          </div>
        }
      </dl>
    </div>
  } @else {
    <div class="flex flex-1 items-center justify-center text-sm text-slate-400">ไม่มีข้อมูล</div>
  }
</article>
