<article class="bg-white rounded-lg border border-slate-200 p-6 flex flex-col gap-5 h-full">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h2 class="text-base font-semibold text-slate-800 border-l-4 border-primary-500 pl-3">
      Tickets ทั้งหมด
    </h2>
    <button
      type="button"
      class="inline-flex items-center justify-center w-8 h-8 rounded-full hover:bg-slate-100 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-(--p-primary-500)"
      aria-label="ตัวเลือกเพิ่มเติม"
    >
      <i class="pi pi-ellipsis-h text-slate-500" aria-hidden="true"></i>
    </button>
  </div>

  <!-- Month/year picker -->
  <p-datepicker
    [formControl]="monthCtrl"
    view="month"
    dateFormat="mm/yy"
    [showIcon]="true"
    icon="pi pi-calendar"
    styleClass="w-56"
    inputStyleClass="text-sm"
    aria-label="เลือกเดือนและปี"
  />

  <!-- Chart + legend -->
  <div class="flex items-center justify-center gap-6 flex-1">
    <!-- Donut chart -->
    <div class=" w-40 md:w-64 shrink-0">
      <canvas
        #chartCanvas
        role="img"
        aria-label="กราฟแสดงสัดส่วน ticket ตามสถานะ"
      ></canvas>
    </div>

    <!-- Legend -->
    <dl class="flex flex-col gap-3">
      @for (seg of segments; track seg.label) {
        <div class="flex items-center gap-2.5">
          <span
            class="inline-block w-3 h-3 rounded-sm shrink-0"
            [style.background]="seg.color"
            aria-hidden="true"
          ></span>
          <dt class="text-sm text-slate-600">{{ seg.label }}</dt>
        </div>
      }
    </dl>
  </div>
</article>
