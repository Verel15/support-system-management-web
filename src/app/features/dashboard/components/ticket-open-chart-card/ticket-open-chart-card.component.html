<article class="bg-white rounded-lg border border-slate-200 p-6 flex flex-col gap-5">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h2 class="text-base font-semibold text-slate-800 border-l-4 border-primary-500 pl-3">
      กราฟการเปิด ticket
    </h2>
  </div>

  <!-- Controls row: year picker + legend -->
  <div class="flex flex-wrap items-center justify-between gap-4">
    <p-datepicker
      [formControl]="yearCtrl"
      view="year"
      dateFormat="yy"
      [showIcon]="true"
      icon="pi pi-calendar"
      styleClass="w-56"
      inputStyleClass="text-sm"
      aria-label="เลือกปี"
    />

    @if (series.length) {
      <div class="flex flex-wrap items-center gap-6" role="list" aria-label="คำอธิบายกราฟ">
        @for (s of series; track s.label) {
          <div class="flex items-center gap-2" role="listitem">
            <span
              class="inline-block w-3.5 h-3.5 rounded-sm shrink-0"
              [style.background]="s.color"
              aria-hidden="true"
            ></span>
            <span class="text-sm text-slate-600">
              {{ s.label }}: <strong class="font-semibold text-slate-800">{{ s.total }}</strong>
            </span>
          </div>
        }
      </div>
    }
  </div>

  @if (loading()) {
    <div class="flex h-96 items-center justify-center" aria-live="polite" aria-label="กำลังโหลด">
      <i class="pi pi-spin pi-spinner text-2xl text-slate-400" aria-hidden="true"></i>
    </div>
  } @else if (data()) {
    <div class="relative h-96 w-full">
      <canvas
        #chartCanvas
        role="img"
        aria-label="กราฟเส้นแสดงจำนวน ticket เปิด สำเร็จ และเกินกำหนดรายเดือน"
      ></canvas>
    </div>
  } @else {
    <div class="flex h-96 items-center justify-center text-sm text-slate-400">ไม่มีข้อมูล</div>
  }
</article>
