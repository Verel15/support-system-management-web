<div class="flex flex-col min-h-full">
  <!-- Page header -->
  <div class="flex items-center gap-3 px-6 py-4 border-b border-secondary-200 bg-white">
    <p-button
      icon="pi pi-arrow-left"
      [text]="true"
      severity="secondary"
      (onClick)="goBack()"
      aria-label="ย้อนกลับ"
    />
    <h1 class="text-xl font-bold text-secondary-900">เพิ่มโครงการ</h1>
  </div>

  <!-- Stepper -->
  <div class="flex-1 overflow-y-auto">
    <div class="max-w-2xl mx-auto px-6 py-8">
      <p-stepper [value]="activeStep()" (valueChange)="onStepChange($event)">
        <p-step-list>
          <p-step [value]="1">ข้อมูลโครงการ</p-step>
          <p-step [value]="2">เพิ่มผู้ใช้</p-step>
          <p-step [value]="3">ตรวจสอบ</p-step>
        </p-step-list>

        <p-step-panels>
          <p-step-panel [value]="1">
            <ng-template #content>
              <app-step1-project-info (next)="nextStep()" />
            </ng-template>
          </p-step-panel>

          <p-step-panel [value]="2">
            <ng-template #content>
              <app-step2-add-users (prev)="prevStep()" (next)="nextStep()" />
            </ng-template>
          </p-step-panel>

          <p-step-panel [value]="3">
            <ng-template #content>
              <app-step3-review (prev)="prevStep()" (save)="onSave()" />
            </ng-template>
          </p-step-panel>
        </p-step-panels>
      </p-stepper>
    </div>
  </div>
</div>
