<div class="p-6 flex flex-col gap-5">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold text-slate-800">จัดการ Ticket</h1>
    <div class="w-full sm:w-auto md:w-44">
      <p-button
        label="เพิ่ม Ticket"
        icon="pi pi-plus"
        (onClick)="onAddTicket()"
        severity="primary"
        fluid
      />
    </div>
  </div>

  <!-- Filters -->
  <div class="flex flex-col sm:flex-row sm:items-center gap-3 flex-wrap">
    <p-select
      [options]="statusOptions"
      [ngModel]="statusFilter()"
      (ngModelChange)="statusFilter.set($event); onFilterChange()"
      optionLabel="label"
      optionValue="value"
      class="w-full sm:w-auto sm:min-w-36"
      aria-label="กรองตามสถานะ"
    />
    <p-select
      [options]="priorityOptions()"
      [ngModel]="priorityFilter()"
      (ngModelChange)="priorityFilter.set($event); onFilterChange()"
      optionLabel="label"
      optionValue="value"
      class="w-full sm:w-auto sm:min-w-44"
      aria-label="กรองตามความสำคัญ"
    />
    <p-select
      [options]="timeOptions"
      [ngModel]="overdueFilter() ? 'overdue' : null"
      (ngModelChange)="onTimeFilterChange($event)"
      optionLabel="label"
      optionValue="value"
      class="w-full sm:w-auto sm:min-w-44"
      aria-label="กรองตามระยะเวลา"
    />
    <div class="flex items-center gap-3 w-full sm:w-80 sm:ml-auto">
      <p-icon-field class="w-full">
        <p-inputicon class="pi pi-search" />
        <input
          pInputText
          type="search"
          placeholder="ค้นหา"
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event); onFilterChange()"
          class="w-full"
          aria-label="ค้นหา ticket"
        />
      </p-icon-field>
    </div>
  </div>

  <!-- Table -->
  <app-data-table
    [columns]="columns"
    [data]="tableData()"
    [totalRecords]="totalRecords()"
    [currentPage]="currentPage()"
    [pageSize]="pageSize()"
    [loading]="loading()"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (sortChange)="onSort($event)"
  >
    <!-- Title column with priority icon -->
    <ng-template dataTableCell="title" let-row let-value="value">
      <div class="flex items-center gap-2 min-w-0">
        @if (getPriorityIconClass(row); as iconClass) {
          <i [class]="iconClass + ' text-xs shrink-0'" aria-hidden="true"></i>
        }
        <span class="truncate" [title]="value">{{ value }}</span>
      </div>
    </ng-template>

    <!-- Status column -->
    <ng-template dataTableCell="currentStatusName" let-value="value">
      <app-status-chip [status]="$any(value)" />
    </ng-template>

    <!-- Actions column -->
    <ng-template dataTableCell="_actions" let-row>
      <button
        type="button"
        class="inline-flex items-center justify-center w-8 h-8 rounded text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-(--p-primary-500)"
        aria-label="การดำเนินการ"
        aria-haspopup="true"
        (click)="onMenuOpen($event, row)"
      >
        <i class="pi pi-ellipsis-h" aria-hidden="true"></i>
      </button>
    </ng-template>
  </app-data-table>
</div>

<!-- Action menu -->
<p-menu #actionMenu [model]="menuItems" [popup]="true" appendTo="body">
  <ng-template #item let-item pTemplate="item">
    <a class="p-menu-item-link" role="menuitem">
      <span class="p-menu-item-label">{{ item.label }}</span>
    </a>
  </ng-template>
</p-menu>
