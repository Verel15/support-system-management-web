<div class="flex flex-col h-full">

  @if (loading()) {
    <div class="flex items-center justify-center flex-1">
      <i class="pi pi-spin pi-spinner text-3xl text-primary-500" aria-label="กำลังโหลด"></i>
    </div>
  } @else {

  <!-- ===== Header ===== -->
  <header class="shrink-0 sticky top-0 z-10 bg-white border-b border-slate-200">
    @if (isEditingTitle()) {
      <div class="flex items-center gap-3 px-6 py-3">
        <button
          type="button"
          class="inline-flex items-center justify-center w-9 h-9 rounded-lg text-slate-500 hover:bg-slate-100 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
          aria-label="กลับ"
          (click)="goBack()"
        ><i class="pi pi-arrow-left" aria-hidden="true"></i></button>

        <input
          pInputText
          type="text"
          class="flex-1"
          [ngModel]="titleDraft()"
          (ngModelChange)="titleDraft.set($event)"
          aria-label="ชื่อ Ticket"
        />

        <p-button label="บันทึก" severity="primary" size="small" [loading]="savingTitle()" (onClick)="onSaveTitle()" />
      </div>
    } @else {
      <div class="flex items-center gap-3 px-6 py-3">
        <button
          type="button"
          class="inline-flex items-center justify-center w-9 h-9 rounded-lg text-slate-500 hover:bg-slate-100 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
          aria-label="กลับ"
          (click)="goBack()"
        ><i class="pi pi-arrow-left" aria-hidden="true"></i></button>

        <h1 class="flex-1 text-center text-xl font-semibold text-slate-800">{{ title() }}</h1>

        <button
          type="button"
          class="inline-flex items-center justify-center w-9 h-9 rounded-lg text-slate-500 hover:bg-slate-100 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
          aria-label="แก้ไขชื่อ Ticket"
          (click)="onStartEditTitle()"
        ><i class="pi pi-pencil" aria-hidden="true"></i></button>
      </div>
    }
  </header>

  <!-- ===== Body: responsive 8/4 grid ===== -->
  <div class="flex-1 overflow-y-auto lg:overflow-hidden grid grid-cols-1 lg:grid-cols-12">
    <app-ticket-comment-feed
      [items]="feedItems()"
      [submitting]="submittingComment()"
      (commentSubmit)="onCommentSubmit($event)"
    />
    <app-ticket-info-panel
      [ticket]="ticket()!"
      [assigneeList]="assigneeList()"
      [requester]="requester()"
      [statusItems]="statusItems()"
      (assigneeAdd)="onAssigneeAdd($event)"
      (assigneeRemove)="onAssigneeRemove($event)"
      (statusChange)="onStatusChange($event)"
      (deleteTicket)="onDeleteTicket()"
    />
  </div>

  }

</div>
