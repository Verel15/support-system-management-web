<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [closable]="false"
  [style]="{ width: '576px' }"
  [contentStyle]="{ padding: '0px' }"
>
  <div class="flex flex-col items-center text-center gap-4 px-10 pb-12 pt-[28px]">
    <i [class]="icon() + ' ' + iconColor()" style="font-size: 56px" aria-hidden="true"></i>
    <h2 class="text-xl font-bold text-secondary-900 mt-4">{{ title() }}</h2>
    <div class="text-secondary-600 text-sm mb-10">
      <ng-content />
    </div>
    <p-button
      [label]="buttonLabel()"
      (onClick)="close()"
      styleClass="w-full mt-2"
      class="w-full"
    />
  </div>
</p-dialog>
