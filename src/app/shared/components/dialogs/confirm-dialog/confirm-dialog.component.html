<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [closable]="false"
  [style]="{ width: '576px' }"
  [contentStyle]="{ padding: '0' }"
>
  <div class="flex flex-col items-center text-center gap-4 px-10 pb-8 pt-7">
    <i [class]="icon() + ' ' + iconColor()" style="font-size: 56px" aria-hidden="true"></i>

    <h2 class="text-xl font-bold text-secondary-900">{{ title() }}</h2>

    <div class="text-secondary-600 text-sm leading-relaxed">
      <ng-content />
    </div>

    <div class="flex gap-3 w-full mt-6">
      <p-button
        [label]="cancelLabel()"
        severity="secondary"
        [outlined]="true"
        (onClick)="onCancel()"
        class="flex-1"
        styleClass="w-full"
      />
      <p-button
        [label]="confirmLabel()"
        [loading]="loading()"
        (onClick)="onConfirm()"
        class="flex-1"
        styleClass="w-full"
      />
    </div>
  </div>
</p-dialog>
