<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [closable]="false"
  [style]="{ width: '576px' }"
  [contentStyle]="{ padding: '0' }"
>
  <div class="flex flex-col items-center text-center gap-4 px-10 pb-8">
    <i class="pi pi-exclamation-circle text-warning-500" style="font-size: 56px" aria-hidden="true"></i>

    <h2 class="text-xl font-bold text-secondary-900">{{ title() }}</h2>

    <p class="text-secondary-600 text-sm leading-relaxed">
      {{ descriptionPrefix() }}
      <strong class="font-bold text-primary-600">{{ targetLabel() }}</strong>
      กรุณากรอกรหัสผ่านเพื่อทำการยืนยันอีกครั้ง
    </p>

    <p-password
      [ngModel]="password()"
      (ngModelChange)="password.set($event)"
      placeholder="กรุณากรอกรหัสผ่าน"
      [toggleMask]="true"
      [feedback]="false"
      [fluid]="true"
      styleClass="w-full h-12"
      inputStyleClass="w-full"
      aria-label="รหัสผ่าน"
    />

    <div class="flex gap-3 w-full mt-6">
      <p-button
        label="ยกเลิก"
        severity="secondary"
        [outlined]="true"
        (onClick)="onCancel()"
        class="flex-1"
        styleClass="w-full"
      />
      <p-button
        label="ยืนยัน"
        [disabled]="!canConfirm()"
        [loading]="loading()"
        (onClick)="onConfirm()"
        class="flex-1"
        styleClass="w-full"
      />
    </div>
  </div>
</p-dialog>
